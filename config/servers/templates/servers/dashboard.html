{% extends "base.html" %}

{% block content %}

<div class="text-center mb-5">

    <h1 class="display-4">🖥️ HealthCheck Dashboard</h1>

    <p class="lead">
        Bienvenido al panel de monitoreo de servidores.
    </p>

</div>

<div class="row">

    <div class="col-md-6 mb-3">

        <div class="card shadow">

            <div class="card-body">

                <h5 class="card-title">
                    📋 Servidores
                </h5>

                <p class="card-text">
                    Ver todos los servidores registrados y su estado.
                </p>

                <a href="{% url 'server_list' %}"
                   class="btn btn-primary">
                    Ver servidores
                </a>

            </div>

        </div>

    </div>

    <div class="col-md-6 mb-3">

        <div class="card shadow">

            <div class="card-body">

                <h5 class="card-title">
                    ➕ Nuevo servidor
                </h5>

                <p class="card-text">
                    Registrar un nuevo servidor para monitorear.
                </p>

                <a href="{% url 'server_create' %}"
                   class="btn btn-success">
                    Añadir servidor
                </a>

            </div>

        </div>

    </div>

</div>
{% endblock %}
