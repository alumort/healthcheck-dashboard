{% extends "base.html" %}

{% block content %}
<a href="{% url 'server_list' %}">
    <button>← Volver a la lista</button>
</a>


<h1>Eliminar servidor</h1>
<hr>

<p>
¿Estás seguro de eliminar "{{ server.nombre }}"?
</p>

<form method="post">
    {% csrf_token %}

    <button type="submit">
        Sí, eliminar
    </button>
</form>

<a href="{% url 'server_detail' server.pk %}">
    Cancelar
</a>

{% endblock %}
