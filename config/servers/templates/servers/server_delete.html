{% extends "base.html" %}

{% block content %}
<a href="{% url 'server_list' %}" class="btn btn-secondary">
    Volver a la lista
</a>


<h1>Eliminar servidor</h1>
<hr>

<p>
¿Estás seguro de eliminar "{{ server.nombre }}"?
</p>

<form method="post">
    {% csrf_token %}

    <button class="btn btn-primary">
        Sí, eliminar
    </button>
</form>

<a href="{% url 'server_detail' server.pk %}" class="btn btn-secondary">
    Cancelar
</a>

{% endblock %}
